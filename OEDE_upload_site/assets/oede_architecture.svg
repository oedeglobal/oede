<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900"><rect width="1400" height="900" fill="white"/><g font-family="Arial, sans-serif"><text x="700" y="72" text-anchor="middle" font-size="38" font-weight="700" fill="#222">OEDE 7-Layer Framework</text><text x="700" y="112" text-anchor="middle" font-size="20" fill="#555">Connecting and accumulating distributed instructional design experiences</text><g transform="translate(170,160)"><rect width="1060" height="86" rx="18" fill="#f5f1ff" stroke="#8673b8"/><text x="32" y="36" font-size="24" font-weight="700" fill="#2d2642">01 AI-Driven Adaptive Learning Content Layer</text><text x="32" y="64" font-size="18" fill="#4f4a5f">Multi-textbook blocks · multi-country perspectives · concept mapping</text></g><g transform="translate(170,260)"><rect width="1060" height="86" rx="18" fill="#fbfbfd" stroke="#b8b4c8"/><text x="32" y="36" font-size="24" font-weight="700" fill="#2d2642">02 Distributed Instructional Design Layer</text><text x="32" y="64" font-size="18" fill="#4f4a5f">Teacher-generated resources · assessment items · mentoring explanations</text></g><g transform="translate(170,360)"><rect width="1060" height="86" rx="18" fill="#f5f1ff" stroke="#8673b8"/><text x="32" y="36" font-size="24" font-weight="700" fill="#2d2642">03 Multi-Level Learning Analytics Layer</text><text x="32" y="64" font-size="18" fill="#4f4a5f">Performance data · self-perception data · support-level adjustment</text></g><g transform="translate(170,460)"><rect width="1060" height="86" rx="18" fill="#fbfbfd" stroke="#b8b4c8"/><text x="32" y="36" font-size="24" font-weight="700" fill="#2d2642">04 Learner-in-the-loop Layer</text><text x="32" y="64" font-size="18" fill="#4f4a5f">Negotiation among learner, AI recommendation, and human mentor</text></g><g transform="translate(170,560)"><rect width="1060" height="86" rx="18" fill="#f5f1ff" stroke="#8673b8"/><text x="32" y="36" font-size="24" font-weight="700" fill="#2d2642">05 Multicultural and Educational Welfare Integration Layer</text><text x="32" y="64" font-size="18" fill="#4f4a5f">Diaspora learners · welfare linkage · educational continuity</text></g><g transform="translate(170,660)"><rect width="1060" height="86" rx="18" fill="#fbfbfd" stroke="#b8b4c8"/><text x="32" y="36" font-size="24" font-weight="700" fill="#2d2642">06 Learning Credential and Mobility Layer</text><text x="32" y="64" font-size="18" fill="#4f4a5f">Portable learning history · learning-first / recognition-later pathways</text></g><g transform="translate(170,760)"><rect width="1060" height="86" rx="18" fill="#f5f1ff" stroke="#8673b8"/><text x="32" y="36" font-size="24" font-weight="700" fill="#2d2642">07 Global Learning Layer</text><text x="32" y="64" font-size="18" fill="#4f4a5f">Digital Silk Road of Learning · multilingual support · global mentors</text></g></g></svg>